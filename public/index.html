let kbLocked = false;

function _kbLockInputFocus() { setTimeout(() => this.blur(), 0); }

function toggleKeyboardLock() {
  kbLocked = !kbLocked;
  const btn = document.getElementById('kbLockBtn');

  if (kbLocked) {
    document.querySelectorAll('input[type="text"], input[type="number"]').forEach(inp => {
      inp.dataset.kbPrevInputmode = inp.getAttribute('inputmode') || '';
      inp.setAttribute('inputmode', 'none');
      inp.setAttribute('readonly', 'readonly');
      inp.dataset.kbLocked = '1';
      inp.addEventListener('focus', _kbLockInputFocus);
    });
    document.querySelectorAll('[contenteditable]').forEach(el => {
      const val = el.getAttribute('contenteditable');
      if (val === 'true' || val === '') {
        el.dataset.kbPrevCE = val;
        el.setAttribute('contenteditable', 'false');
        el.dataset.kbLocked = '1';
      }
    });
  } else {
    document.querySelectorAll('input[data-kb-locked]').forEach(inp => {
      const prev = inp.dataset.kbPrevInputmode || '';
      if (prev) inp.setAttribute('inputmode', prev); else inp.removeAttribute('inputmode');
      inp.removeAttribute('readonly');
      inp.removeEventListener('focus', _kbLockInputFocus);
      delete inp.dataset.kbPrevInputmode;
      delete inp.dataset.kbLocked;
    });
    document.querySelectorAll('[data-kb-locked]').forEach(el => {
      if (el.tagName === 'INPUT') return;
      el.setAttribute('contenteditable', el.dataset.kbPrevCE || 'true');
      delete el.dataset.kbPrevCE;
      delete el.dataset.kbLocked;
    });
  }

  btn.classList.toggle('locked', kbLocked);
  btn.title = kbLocked ? 'Keyboard locked — tap to unlock' : 'Lock keyboard (scroll mode)';
  const svg = btn.querySelector('svg');
  if (kbLocked) {
    svg.innerHTML = '<rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/><line x1="12" y1="15" x2="12" y2="17" stroke-linecap="round" stroke-width="2.5"/>';
  } else {
    svg.innerHTML = '<rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/>';
  }
}

// ═══════════════════════════════════════
// AUTO-SAVE  (localStorage — survives tab close / refresh)
// ═══════════════════════════════════════
const SAVE_KEY = 'shadab_editor_v1';
let _autoSaveTimer = null;

function collectState() {
  // Save full innerHTML of every page's columns-area + info inputs
  const pages = [...document.querySelectorAll('.page')];
  const data = {
    v: 2,
    ts: Date.now(),
    headline: document.querySelector('.headline')?.innerHTML || '',
    pages: pages.map(p => {
      const area = p.querySelector('.columns-area');
      return {
        id: p.id,
        // Prefer pre-render source (has $…$ intact) over post-MathJax SVG
        html: area?.dataset.latexSource || area?.innerHTML || '',
        hasLatex: !!(area?.dataset.latexSource)
      };
    }),
    inputs: {},
    font: document.getElementById('fontFamily')?.value || '',
    fontSize: document.getElementById('fontSize')?.value || '10',
  };
  document.querySelectorAll('.info-input').forEach((el, i) => {
    data.inputs[el.placeholder || i] = el.value;
  });
  return data;
}

function applyState(data) {
  if (!data || data.v < 2) return false;
  if (data.headline !== undefined) {
    const h = document.querySelector('.headline');
    if (h) h.innerHTML = data.headline;
  }
  // Restore page 1 columns area
  const p1area = document.getElementById('columnsArea');
  if (p1area && data.pages?.[0]) {
    p1area.innerHTML = data.pages[0].html;
    // If this was pre-render LaTeX source, store it back and re-typeset
    if (data.pages[0].hasLatex) {
      p1area.dataset.latexSource = data.pages[0].html;
      // Re-run MathJax once it's ready
      if (typeof MathJax !== 'undefined' && MathJax.typesetPromise) {
        MathJax.typesetPromise([p1area]).catch(e => console.warn('MathJax restore error:', e));
      } else {
        // MathJax not yet loaded — wait for it
        window.addEventListener('load', () => {
          if (MathJax?.typesetPromise) MathJax.typesetPromise([p1area]).catch(()=>{});
        }, { once: true });
      }
    }
  }
  // Restore info inputs
  document.querySelectorAll('.info-input').forEach((el) => {
    const val = data.inputs?.[el.placeholder];
    if (val !== undefined) el.value = val;
  });
  if (data.font) { document.getElementById('fontFamily').value = data.font; applyFont(data.font); }
  if (data.fontSize) { document.getElementById('fontSize').value = data.fontSize; applyFontSize(data.fontSize); }
  return true;
}

function setAutosaveDot(state) {
  const dot = document.getElementById('autosaveDot');
  const lbl = document.getElementById('autosaveLabel');
  if (!dot) return;
  dot.className = 'autosave-dot' + (state === 'saving' ? ' saving' : state === 'error' ? ' error' : '');
  if (lbl) lbl.title = state === 'ok' ? 'Auto-saved to browser storage' : state === 'saving' ? 'Saving…' : 'Save error';
}

function autoSave() {
  try {
    setAutosaveDot('saving');
    const json = JSON.stringify(collectState());
    localStorage.setItem(SAVE_KEY, json);
    setAutosaveDot('ok');
  } catch(e) {
    setAutosaveDot('error');
    console.warn('AutoSave failed:', e);
  }
}

function scheduleAutoSave() {
  clearTimeout(_autoSaveTimer);
  _autoSaveTimer = setTimeout(autoSave, 1500);
}

function localSaveNow() {
  autoSave();
  setDriveStatus('✅ Saved to browser storage.');
}

function localLoad() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) { setDriveStatus('⚠️ No saved data found.'); return; }
    const data = JSON.parse(raw);
    document.querySelectorAll('.page-cont').forEach(p => p.remove());
    if (applyState(data)) {
      setDriveStatus('✅ Restored. ' + new Date(data.ts).toLocaleString());
      setTimeout(reflowPages, 300);
    } else {
      setDriveStatus('⚠️ Saved data format not recognised.');
    }
  } catch(e) { setDriveStatus('❌ Error loading: ' + e.message); }
}

function localClear() {
  if (!confirm('Clear all browser-saved data?')) return;
  localStorage.removeItem(SAVE_KEY);
  setDriveStatus('🗑️ Cleared.');
}

// Auto-save on every edit
document.addEventListener('input', e => {
  if (e.target.closest('.columns-area') || e.target.closest('.info-input') || e.target.closest('.headline')) {
    // If user edits after a LaTeX render, the latexSource is stale — clear it
    const area = e.target.closest('.columns-area');
    if (area && area.dataset.latexSource) delete area.dataset.latexSource;
    scheduleAutoSave();
  }
});

// Restore on load — wait for MathJax to be ready before re-typesetting
window.addEventListener('load', () => {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (data && data.v === 2 && data.pages?.[0]?.html) {
      document.querySelectorAll('.page-cont').forEach(p => p.remove());
      applyState(data);
      setTimeout(reflowPages, 400);
      setAutosaveDot('ok');
    }
  } catch(e) { console.warn('Auto-restore failed:', e); }
});

// ═══════════════════════════════════════
// EXPORT / IMPORT  .shadab file
// Stores full HTML with UTF-8 BOM so encoding is always preserved
// ═══════════════════════════════════════
function exportFile() {
  try {
    const state = collectState();
    // Wrap in a self-contained JSON envelope
    const envelope = {
      app: 'ShadabPageEditor',
      version: 2,
      exported: new Date().toISOString(),
      state
    };
    const json = JSON.stringify(envelope, null, 2);
    // UTF-8 BOM ensures any editor/importer sees correct encoding
    const bom  = '\uFEFF';
    const blob = new Blob([bom + json], { type: 'application/json;charset=utf-8' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = 'shadab_' + new Date().toISOString().slice(0,10) + '.shadab';
    a.click();
    URL.revokeObjectURL(url);
    setDriveStatus('✅ File downloaded.');
  } catch(e) { setDriveStatus('❌ Export failed: ' + e.message); }
}

function importFile(evt) {
  const file = evt.target.files[0];
  if (!file) return;
  setDriveStatus('⏳ Reading file…');
  const reader = new FileReader();
  reader.onload = e => {
    try {
      // Strip BOM if present
      let text = e.target.result.replace(/^\uFEFF/, '');
      const envelope = JSON.parse(text);
      const data = envelope.state || envelope; // support both formats
      document.querySelectorAll('.page-cont').forEach(p => p.remove());
      if (applyState(data)) {
        setTimeout(reflowPages, 300);
        autoSave(); // persist to localStorage too
        setDriveStatus('✅ Imported: ' + file.name);
      } else {
        setDriveStatus('⚠️ File format not recognised.');
      }
    } catch(err) { setDriveStatus('❌ Import failed: ' + err.message); }
    evt.target.value = ''; // reset input
  };
  reader.readAsText(file, 'UTF-8');
}

// ═══════════════════════════════════════
// GOOGLE DRIVE  (Picker API + Drive REST v3)
// User must paste their own Client ID in the prompt the first time
// ═══════════════════════════════════════
// ═══════════════════════════════════════
// GOOGLE DRIVE  via Apps Script Web App
// No OAuth, no Client ID — just your Gmail
// ═══════════════════════════════════════
function getScriptUrl() {
  const url = localStorage.getItem('shadab_script_url') || '';
  const input = document.getElementById('scriptUrl');
  if (input && !input.value && url) input.value = url;
  return url;
}

function driveSaveUrl() {
  const input = document.getElementById('scriptUrl');
  const url = input ? input.value.trim() : '';
  if (!url) { setDriveStatus('⚠️ Paste your Apps Script URL first.'); return; }
  localStorage.setItem('shadab_script_url', url);
  setDriveStatus('✅ URL saved!');
}

// Load saved URL into input on panel open
function toggleDrivePanel() {
  const panel = document.getElementById('drivePanel');
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) {
    const saved = localStorage.getItem('shadab_script_url') || '';
    const input = document.getElementById('scriptUrl');
    if (input && saved) input.value = saved;
  }
}

async function driveExport() {
  const url = localStorage.getItem('shadab_script_url') || document.getElementById('scriptUrl')?.value.trim();
  if (!url) { setDriveStatus('⚠️ No Apps Script URL set.'); return; }
  try {
    setDriveStatus('⏳ Saving to Drive…');
    const envelope = {
      app: 'ShadabPageEditor', version: 2,
      exported: new Date().toISOString(),
      state: collectState()
    };
    const res = await fetch(url, {
      method: 'POST',
      body: JSON.stringify(envelope),
      headers: { 'Content-Type': 'text/plain' } // Apps Script needs text/plain for doPost
    });
    const json = await res.json();
    if (json.success) {
      setDriveStatus('✅ Saved to Google Drive!');
      autoSave();
    } else {
      setDriveStatus('❌ ' + (json.error || 'Unknown error'));
    }
  } catch(e) { setDriveStatus('❌ ' + e.message); }
}

async function driveImport() {
  const url = localStorage.getItem('shadab_script_url') || document.getElementById('scriptUrl')?.value.trim();
  if (!url) { setDriveStatus('⚠️ No Apps Script URL set.'); return; }
  try {
    setDriveStatus('⏳ Loading from Drive…');
    const res  = await fetch(url);
    const text = (await res.text()).replace(/^\uFEFF/, '');
    const envelope = JSON.parse(text);
    const data = envelope.state || envelope;
    document.querySelectorAll('.page-cont').forEach(p => p.remove());
    if (applyState(data)) {
      setTimeout(reflowPages, 300);
      autoSave();
      const d = envelope.exported ? new Date(envelope.exported).toLocaleString() : '';
      setDriveStatus('✅ Loaded!' + (d ? ' Saved: ' + d : ''));
    } else {
      setDriveStatus('⚠️ File format not recognised.');
    }
  } catch(e) { setDriveStatus('❌ ' + e.message); }
}


function setDriveStatus(msg) {
  const el = document.getElementById('driveStatus');
  if (el) el.textContent = msg;
}

function toggleDrivePanel() {
  const panel = document.getElementById('drivePanel');
  panel.classList.toggle('open');
}

// Close drive panel on outside click
document.addEventListener('click', e => {
  const panel = document.getElementById('drivePanel');
  const btn   = document.getElementById('driveBtn');
  if (panel && !panel.contains(e.target) && btn && !btn.contains(e.target)) {
    panel.classList.remove('open');
  }
});
</script>
