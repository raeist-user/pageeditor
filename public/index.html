<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Shadab Page Editor</title>

<!-- Fonts — synced from GitHub fonts/ folder on demand -->
<style id="fontFaceStyle"></style>
<script>
const GITHUB_USER   = 'raeist-user';
const GITHUB_REPO   = 'pageeditor';
const GITHUB_BRANCH = 'main';
const GITHUB_TOKEN  = 'GITHUB_TOKEN_PLACEHOLDER';

let _fontsSynced = false;
let _fontsSyncing = false;

function familyFromFile(name) {
  const base = name.replace(/\.(ttf|otf|woff2?)$/i, '');
  const weightWords = /^(regular|bold|italic|medium|light|semibold|extrabold|thin|black|bolditalic)$/i;
  const parts = base.split(/[-_]/).filter(p => !weightWords.test(p));
  return parts.join(' ').replace(/([a-z])([A-Z])/g, '$1 $2').trim();
}
function styleFromFile(name)  { return /italic/i.test(name) ? 'italic' : 'normal'; }
function weightFromFile(name) {
  if (/thin/i.test(name))      return 100;
  if (/light/i.test(name))     return 300;
  if (/medium/i.test(name))    return 500;
  if (/semibold/i.test(name))  return 600;
  if (/extrabold/i.test(name)) return 800;
  if (/black/i.test(name))     return 900;
  if (/bold/i.test(name))      return 700;
  return 400;
}
function formatFromFile(name) {
  if (/\.woff2$/i.test(name)) return 'woff2';
  if (/\.woff$/i.test(name))  return 'woff';
  if (/\.otf$/i.test(name))   return 'opentype';
  return 'truetype';
}

async function syncFonts(force) {
  if (_fontsSyncing) return;
  if (_fontsSynced && !force) return;
  _fontsSyncing = true;

  const select = document.getElementById('fontFamily');
  select.innerHTML = '<option value="">Loading…</option>';

  try {
    const headers = { 'Accept': 'application/vnd.github.v3+json' };
    if (GITHUB_TOKEN) headers['Authorization'] = 'token ' + GITHUB_TOKEN;

    const res = await fetch(
      `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/fonts?ref=${GITHUB_BRANCH}`,
      { headers }
    );
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const files = await res.json();

    const fontFiles = files.filter(f =>
      f.type === 'file' && /\.(ttf|otf|woff2?)$/i.test(f.name)
    );
    if (!fontFiles.length) throw new Error('No font files found in fonts/');

    const results = await Promise.allSettled(
      fontFiles.map(async f => {
        const r = await fetch(f.download_url, {
          headers: GITHUB_TOKEN ? { 'Authorization': 'token ' + GITHUB_TOKEN } : {}
        });
        if (!r.ok) throw new Error(f.name + ' HTTP ' + r.status);
        const blob = await r.blob();
        const b64  = await new Promise(ok => {
          const fr = new FileReader();
          fr.onload = () => ok(fr.result);
          fr.readAsDataURL(blob);
        });
        return {
          name  : f.name,
          family: familyFromFile(f.name),
          style : styleFromFile(f.name),
          weight: weightFromFile(f.name),
          format: formatFromFile(f.name),
          b64
        };
      })
    );

    const css = results.map(r => {
      if (r.status === 'rejected') return '';
      const { family, style, weight, format, b64 } = r.value;
      return `@font-face{font-family:'${family}';font-style:${style};font-weight:${weight};src:url('${b64}') format('${format}');}`;
    }).filter(Boolean).join('\n');

    document.getElementById('fontFaceStyle').textContent = css;

    // Rebuild dropdown
    const seen = new Set();
    select.innerHTML = '<option value="">— select —</option>';
    results.forEach(r => {
      if (r.status !== 'fulfilled') return;
      const fam = r.value.family;
      if (seen.has(fam)) return;
      seen.add(fam);
      const opt = document.createElement('option');
      opt.value = `'${fam}',serif`;
      opt.textContent = fam;
      select.appendChild(opt);
    });

    _fontsSynced = true;
  } catch(e) {
    select.innerHTML = '<option value="">⚠ Failed</option>';
    console.warn('Font sync error:', e.message);
  }
  _fontsSyncing = false;
}
</script>
<!-- MathJax (LaTeX rendering) -->
<script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']]
    },
    svg: { fontCache: 'global' },
    startup: { typeset: false }
  };
</script>
<script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>

<script src="https://unpkg.com/docx@8.5.0/build/index.umd.js"></script>
<!-- PDF export -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --bg:#e8e8e8; --tb:#f3f3f3; --tb-border:#d0d0d0;
  --hover:#e0e0e0; --active:#c8d8f0;
  --page:#ffffff; --shadow:0 2px 12px rgba(0,0,0,.18);
  --accent:#2563a8; --text:#1a1a1a; --input:#ccc;
}
html,body { height:100%; font-family:'Nunito Sans',sans-serif; background:var(--bg); color:var(--text); overflow:hidden; }


/* ── RIBBON ── */
.ribbon { background:var(--tb); border-bottom:1px solid var(--tb-border); padding:4px 8px; display:flex; align-items:center; flex-wrap:wrap; gap:2px; }
.rsep { width:1px; height:22px; background:#d0d0d0; margin:0 4px; }
.rb { height:26px; padding:0 7px; border:none; background:transparent; border-radius:3px; cursor:pointer; font-size:12px; display:flex; align-items:center; gap:4px; color:#333; font-family:'Nunito Sans',sans-serif; transition:background .12s; white-space:nowrap; }
.rb:hover{background:var(--hover);} .rb:active,.rb.on{background:var(--active);}
.rb svg{width:14px;height:14px;flex-shrink:0;}
.rb-sel { height:26px; border:1px solid var(--input); border-radius:3px; background:#fff; font-size:12px; padding:0 6px; cursor:pointer; color:#333; font-family:'Nunito Sans',sans-serif; outline:none; }
.rb-sel:focus{border-color:var(--accent);}
.fsize { width:42px; height:26px; border:1px solid var(--input); border-radius:3px; text-align:center; font-size:12px; padding:0 4px; outline:none; font-family:'Nunito Sans',sans-serif; }
.fsize:focus{border-color:var(--accent);}

/* ── SMART FORMAT — menu bar buttons ── */
.mf-sep { width:1px; height:18px; background:#c0c0c0; margin:0 3px; align-self:center; }
.mf-btn { height:22px; padding:0 8px; border:1px solid var(--input); background:#fff; border-radius:3px; cursor:pointer; font-size:11.5px; font-family:'Nunito Sans',sans-serif; color:#333; font-weight:600; display:flex; align-items:center; gap:3px; transition:background .12s; white-space:nowrap; }
.mf-btn:hover{background:var(--hover);border-color:#aaa;} .mf-btn:active{background:var(--active);}
.mf-btn.reset-btn{color:#7a4a20;border-color:#c8a87a;background:#fff8f0;}
.mf-btn.reset-btn:hover{background:#ffeedd;}

/* ── RULER ── */
.ruler { height:20px; background:#f8f8f8; border-bottom:1px solid #ddd; overflow:hidden; }
.ruler canvas { display:block; width:100%; height:100%; }

/* ── LAYOUT ── */
.app { display:flex; flex-direction:column; height:100vh; overflow:hidden; }
.toolbar-area { flex-shrink:0; }
.main-area { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.editor-scroll { flex:1; overflow:auto; background:var(--bg); position:relative; }
.editor-scroll::-webkit-scrollbar{width:8px;height:8px;}
.editor-scroll::-webkit-scrollbar-track{background:#d8d8d8;}
.editor-scroll::-webkit-scrollbar-thumb{background:#aaa;border-radius:4px;}

/* ── ZOOM CONTAINERS ── */
/* zoom-outer fills the scroll area and is sized by JS to the true scaled dimensions */
.zoom-outer {
  position: relative;
  /* width & height set by JS */
}
/* zoom-wrapper is absolutely placed inside outer, scaled from top-left */
.zoom-wrapper {
  position: absolute;
  top: 0; left: 0;
  display: flex;
  flex-direction: column;   /* pages stack top → bottom */
  align-items: center;
  padding: 24px 40px 48px;
  gap: 0;
  transform-origin: top left;
  will-change: transform;
}

/* ── PAGE (exact A4 297×210mm) ── */
.page { width:210mm; height:297mm; background:var(--page); box-shadow:var(--shadow); padding:0.1in; position:relative; font-family:'EB Garamond',Georgia,serif; font-size:11pt; line-height:1.5; color:#111; overflow:hidden; flex-shrink:0; }

/* Page 1 header */
.page-header { text-align:center; margin-bottom:4px; }
.headline { font-family:'EB Garamond',serif; font-size:15pt; font-weight:700; letter-spacing:.5px; color:#111; line-height:1.15; margin-bottom:3px; }
.info-row { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:6px; font-family:'Nunito Sans',sans-serif; font-size:9.5pt; }
.info-left,.info-right { display:flex; flex-direction:column; gap:4px; }
.info-field { display:flex; align-items:center; gap:6px; }
.info-field label { font-weight:700; color:#222; min-width:48px; font-size:9pt; }
.info-input { border:none; border-bottom:1.5px solid #555; outline:none; font-family:'EB Garamond',serif; font-size:10pt; color:#111; background:transparent; width:120px; padding:1px 2px; transition:border-color .2s; }
.info-input:focus{border-bottom-color:var(--accent);}
.info-input.short{width:70px;}
.page-divider { border:none; border-top:2px solid #222; margin:6px 0 8px; }
.page-divider.thin { border-top-width:1px; border-top-color:#999; margin:3px 0 8px; }

/* Continuation page label */
.cont-label { font-size:10pt; font-family:'EB Garamond',serif; color:#888; text-align:center; margin-bottom:6px; font-style:italic; }

/* ── 3-COLUMN CONTENT AREA ── */
.columns-area {
  column-count:3; column-gap:14px; column-rule:1px solid #ccc; column-fill:auto;
  overflow:hidden; outline:none;
  font-family:'EB Garamond',serif; font-size:10.5pt; line-height:1.65; color:#111;
  word-break:break-word; text-align:justify;
  /* height set by JS */
}
.columns-area:empty::before { content:'Start typing or paste questions here…'; color:#bbb; font-style:italic; pointer-events:none; }
.columns-area:focus { caret-color:var(--accent); }
.columns-area div,.columns-area p { margin:0; min-height:1lh; break-inside:avoid; }

/* RTL Urdu mode */
.columns-area.urdu-mode {
  direction:rtl; text-align:right;
  font-family:JameelNooriNastaliq,'Nastaliq',serif;
  font-size:20px; line-height:2.4;
}
.urdu-mode div,.urdu-mode p { direction:rtl; unicode-bidi:embed; }

/* ── MARGIN PANEL ── */
.margin-panel {
  display: none; position: fixed;
  background: #fff; border: 1px solid #ccc; border-radius: 6px;
  box-shadow: 0 4px 18px rgba(0,0,0,.18);
  padding: 12px 16px 14px; z-index: 9999; width: 220px;
  font-family: 'Nunito Sans', sans-serif; font-size: 12px;
}
.margin-panel.open { display: block; }
.margin-panel h4 { font-size: 12px; font-weight: 700; color: #333; margin-bottom: 10px; }
.mp-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.mp-row label { color: #555; font-size: 11px; min-width: 52px; }
.mp-row input[type=range] { flex:1; margin: 0 8px; accent-color: var(--accent); }
.mp-row .mp-val { font-size: 11px; color: #888; min-width: 32px; text-align: right; }
.mp-wrap { position: relative; }
.mp-apply { margin-top: 10px; width: 100%; height: 26px; background: var(--accent); color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-family: 'Nunito Sans', sans-serif; font-weight: 600; }
.mp-apply:hover { background: #1a4e96; }
.mp-presets { display: flex; gap: 6px; margin-bottom: 10px; }
.mp-preset { flex:1; height:22px; font-size:10px; border:1px solid #bbb; background:#f6f6f6; border-radius:3px; cursor:pointer; font-family:'Nunito Sans',sans-serif; }
.mp-preset:hover { background:#e8f0fb; border-color:var(--accent); color:var(--accent); }
.latex-src { display:none; }

/* ── KEYBOARD LOCK ── */
.rb.kb-lock { color:#c0392b; border:1.5px solid transparent; }
.rb.kb-lock.locked { background:#fdecea; border-color:#e57373; color:#b71c1c; }
.rb.kb-lock.locked:hover { background:#ffcdd2; }

/* ── STATUS BAR ── */
.status-bar { height:22px; background:#f0f0f0; border-top:1px solid #d0d0d0; display:flex; align-items:center; padding:0 12px; gap:18px; font-size:11px; color:#666; font-family:'Nunito Sans',sans-serif; flex-shrink:0; }
.status-right { margin-left:auto; display:flex; gap:14px; align-items:center; }
.zoom-ctrl { display:flex; align-items:center; gap:5px; }
.zoom-slider { width:70px; accent-color:var(--accent); }

/* ── PAGE NAVIGATOR ── */
.page-nav {
  height: 36px;
  background: #2a2a2a;
  border-top: 1px solid #111;
  display: flex; align-items: center; justify-content: center;
  gap: 6px;
  flex-shrink: 0;
  padding: 0 12px;
  overflow-x: auto;
}
.page-nav::-webkit-scrollbar { height: 3px; }
.page-nav::-webkit-scrollbar-thumb { background: #555; border-radius: 2px; }
.pg-btn {
  min-width: 28px; height: 24px;
  border: 1.5px solid #555;
  background: #3a3a3a;
  color: #ccc;
  border-radius: 4px;
  font-size: 11px;
  font-family: 'Nunito Sans', sans-serif;
  cursor: pointer;
  padding: 0 8px;
  transition: background .12s, border-color .12s;
  white-space: nowrap;
  flex-shrink: 0;
}
.pg-btn:hover { background: #505050; border-color: #888; color: #fff; }
.pg-btn.active { background: var(--accent); border-color: #4a8fe0; color: #fff; }
.pg-nav-arrow {
  width: 24px; height: 24px;
  background: transparent; border: none;
  color: #aaa; font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  border-radius: 3px;
  transition: color .12s;
}
.pg-nav-arrow:hover { color: #fff; }

/* ── AUTOSAVE INDICATOR ── */
.autosave-dot { width:7px; height:7px; border-radius:50%; background:#4caf50; display:inline-block; margin-left:4px; transition:background .3s; }
.autosave-dot.saving { background:#f5a623; }
.autosave-dot.error  { background:#e53e3e; }

/* ── DRIVE PANEL ── */
.drive-panel {
  display:none; position:fixed;
  background:#fff; border:1px solid #ccc; border-radius:6px;
  box-shadow:0 4px 18px rgba(0,0,0,.18);
  padding:14px 16px 16px; z-index:9999; width:260px;
  font-family:'Nunito Sans',sans-serif; font-size:12px;
}
.drive-panel.open { display:block; }
.drive-panel h4 { font-size:12px; font-weight:700; color:#333; margin-bottom:10px; display:flex; align-items:center; gap:6px; }
.drive-section { margin-bottom:10px; }
.drive-section label { display:block; color:#555; font-size:11px; margin-bottom:4px; font-weight:600; }
.drive-input { width:100%; height:26px; border:1px solid #ccc; border-radius:3px; padding:0 7px; font-size:11.5px; font-family:'Nunito Sans',sans-serif; outline:none; }
.drive-input:focus { border-color:var(--accent); }
.drive-btn { width:100%; height:27px; border:none; border-radius:4px; cursor:pointer; font-size:12px; font-family:'Nunito Sans',sans-serif; font-weight:600; margin-top:5px; display:flex; align-items:center; justify-content:center; gap:6px; }
.drive-btn.export { background:#1a73e8; color:#fff; }
.drive-btn.export:hover { background:#1558b0; }
.drive-btn.import { background:#34a853; color:#fff; }
.drive-btn.import:hover { background:#267a3e; }
.drive-btn.local-export { background:#f3f3f3; color:#333; border:1px solid #ccc; }
.drive-btn.local-export:hover { background:#e8e8e8; }
.drive-status { font-size:10.5px; color:#666; margin-top:8px; min-height:14px; text-align:center; }
.drive-sep { height:1px; background:#eee; margin:10px 0; }

@media print {
  .toolbar-area,.ruler,.status-bar,.page-nav{display:none!important;}
  .editor-scroll{overflow:visible!important;background:none;}
  .zoom-outer,.zoom-wrapper{position:static!important;transform:none!important;width:auto!important;height:auto!important;padding:0!important;gap:0!important;}
  .page{box-shadow:none!important;overflow:visible!important;page-break-after:always;break-after:page;height:297mm!important;width:210mm!important;margin:0!important;}
  .columns-area{overflow:visible!important;height:auto!important;}
  body,html{overflow:visible!important;height:auto!important;}
  .app,.main-area{height:auto!important;overflow:visible!important;}
}
</style>
</head>
<body>
<div class="app">

<div class="toolbar-area">

<!-- ═══ ROW 1: Font · Font Size · Align · Bullets ═══ -->
<div class="ribbon">
  <select class="rb-sel" style="width:80px;" id="fontFamily" onchange="applyFont(this.value)" onfocus="syncFonts()">
    <option value="">Fonts…</option>
  </select>
  <input type="number" class="fsize" id="fontSize" value="10" min="6" max="72" onchange="applyFontSize(this.value)" title="pt">
  <div class="rsep"></div>
  <button class="rb" onclick="document.execCommand('justifyLeft')" title="Left"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="18" x2="18" y2="18"/></svg></button>
  <button class="rb" onclick="document.execCommand('justifyCenter')" title="Centre"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="6" y1="12" x2="18" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg></button>
  <button class="rb" onclick="document.execCommand('justifyRight')" title="Right"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="9" y1="12" x2="21" y2="12"/><line x1="6" y1="18" x2="21" y2="18"/></svg></button>
  <button class="rb" onclick="document.execCommand('justifyFull')" title="Justify"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
  <div class="rsep"></div>
  <button class="rb" onclick="document.execCommand('insertUnorderedList')" title="Bullets"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><circle cx="4" cy="6" r="1.5" fill="currentColor" stroke="none"/><circle cx="4" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="4" cy="18" r="1.5" fill="currentColor" stroke="none"/></svg></button>
  <button class="rb" onclick="document.execCommand('insertOrderedList')" title="Numbered"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><text x="2" y="8" font-size="6" fill="currentColor" stroke="none">1.</text><text x="2" y="14" font-size="6" fill="currentColor" stroke="none">2.</text><text x="2" y="20" font-size="6" fill="currentColor" stroke="none">3.</text></svg></button>
</div>

<!-- ═══ ROW 2: Render LaTeX · Urdu · KB Lock · Save PDF · Save DOCX · Margins ═══ -->
<div class="ribbon">
  <button class="rb" onclick="renderAllLatex()" title="Render LaTeX" style="color:#7b2d8b;font-weight:700;font-size:13px;">∑</button>
  <button class="rb" id="urduBtn" onclick="toggleUrdu()" title="Toggle Urdu RTL mode" style="color:#1a6b3a;font-weight:700;">اردو</button>
  <div class="rsep"></div>
  <button class="rb" onclick="savePDF()" title="Save as PDF"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg></button>
  <button class="rb" onclick="saveDocx()" title="Save DOCX" style="color:#1a5c2a;font-weight:600;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg></button>
  <div class="rsep"></div>
  <!-- Drive button -->
  <div class="mp-wrap" id="driveWrap">
    <button class="rb" id="driveBtn" onclick="toggleDrivePanel()" title="Google Drive / Local Save & Load" style="color:#1a73e8;font-weight:700;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M12 2L2 19h20L12 2z" stroke-linejoin="round"/><path d="M2 19h20" /><path d="M8.5 13L12 7l3.5 6"/></svg>
    </button>
    <div class="drive-panel" id="drivePanel">
      <h4>
        <svg viewBox="0 0 24 24" fill="none" stroke="#1a73e8" stroke-width="2" width="14" height="14"><path d="M12 2L2 19h20L12 2z" stroke-linejoin="round"/></svg>
        Drive &amp; Local Storage
      </h4>

      <!-- LOCAL AUTO-SAVE -->

<script>
'use strict';

// ═══════════════════════════════════════
// PRESERVE EDITOR FOCUS on toolbar clicks
// ═══════════════════════════════════════
document.querySelectorAll('.toolbar-area .rb, .toolbar-area .mf-btn').forEach(btn => {
  btn.addEventListener('mousedown', e => e.preventDefault());
});

// ═══════════════════════════════════════
// MENU DROPDOWNS
// ═══════════════════════════════════════
document.querySelectorAll('.menu-item').forEach(item => {
  item.addEventListener('click', e => {
    e.stopPropagation();
    const was = item.classList.contains('open');
    document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('open'));
    if (!was) item.classList.add('open');
  });
  item.addEventListener('mouseenter', () => {
    if (document.querySelector('.menu-item.open')) {
      document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('open'));
      item.classList.add('open');
    }
  });
});
document.addEventListener('click', () => document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('open')));

// ═══════════════════════════════════════
// ZOOM  — absolute outer/wrapper pattern
// outer is sized to true scaled dimensions → scrollbars are correct
// wrapper is absolutely inside outer, scaled from top-left
// When content narrower than viewport → centred via left offset
// ═══════════════════════════════════════
let currentZoom = 1.0;
let _natW = 0, _natH = 0;

function cacheNatSize() {
  const w = document.getElementById('zoomWrapper');
  const prev = w.style.transform;
  w.style.transform = 'none';
  _natW = w.offsetWidth;
  _natH = w.offsetHeight;
  w.style.transform = prev || '';
}

function applyZoom(z, fx, fy) {
  const scroll  = document.getElementById('editorScroll');
  const outer   = document.getElementById('zoomOuter');
  const wrapper = document.getElementById('zoomWrapper');
  z = Math.min(2.5, Math.max(0.3, z));

  // Focal point in unscaled content coords
  const cx = (scroll.scrollLeft + fx) / currentZoom;
  const cy = (scroll.scrollTop  + fy) / currentZoom;
  currentZoom = z;

  const sw  = _natW * z, sh = _natH * z;
  const vpW = scroll.clientWidth, vpH = scroll.clientHeight;

  wrapper.style.transform       = `scale(${z})`;
  wrapper.style.transformOrigin = 'top left';

  // Outer tells the scrollbar the real visual size
  outer.style.width  = Math.max(vpW, sw) + 'px';
  outer.style.height = Math.max(vpH, sh) + 'px';

  // Horizontally centre when content is narrower than viewport
  const ox = sw < vpW ? (vpW - sw) / 2 : 0;
  wrapper.style.left = ox + 'px';

  // Restore focal point
  scroll.scrollLeft = Math.max(0, cx * z - fx + ox);
  scroll.scrollTop  = Math.max(0, cy * z - fy);

  document.getElementById('zoomSlider').value      = Math.round(z * 100);
  document.getElementById('zoomLabel').textContent = Math.round(z * 100) + '%';
  scheduleRuler();
}

function setZoom(val) {
  const s = document.getElementById('editorScroll');
  applyZoom(parseFloat(val) / 100, s.clientWidth / 2, s.clientHeight / 2);
}

let _rulerTimer = null;
function scheduleRuler() { clearTimeout(_rulerTimer); _rulerTimer = setTimeout(drawRuler, 80); }

window.addEventListener('resize', () => {
  cacheNatSize();
  const s = document.getElementById('editorScroll');
  applyZoom(currentZoom, s.clientWidth / 2, s.clientHeight / 2);
  drawRuler();
});

// Block browser zoom
document.addEventListener('wheel', e => {
  if (!e.ctrlKey) return;
  e.preventDefault();
  const s = document.getElementById('editorScroll');
  const r = s.getBoundingClientRect();
  applyZoom(currentZoom * (e.deltaY < 0 ? 1.08 : 1/1.08), e.clientX - r.left, e.clientY - r.top);
}, { passive: false });

document.addEventListener('keydown', e => {
  if (!e.ctrlKey) return;
  if (e.key === '0') { e.preventDefault(); setZoom(100); }
  else if (e.key === '+' || e.key === '=') { e.preventDefault(); setZoom(Math.round(currentZoom * 110)); }
  else if (e.key === '-') { e.preventDefault(); setZoom(Math.round(currentZoom / 1.1 * 100)); }
});

// Pinch zoom — RAF batched
(function() {
  const scroll = document.getElementById('editorScroll');
  let sd=null, sz=null, mx=null, my=null, pz=null, raf=null;
  const pd = (a,b) => Math.hypot(a.clientX-b.clientX, a.clientY-b.clientY);
  const flush = () => { raf=null; if(pz!==null){applyZoom(pz,mx,my);pz=null;} };

  scroll.addEventListener('touchstart', e => {
    if (e.touches.length!==2) return;
    e.preventDefault();
    const r = scroll.getBoundingClientRect();
    sd = pd(e.touches[0], e.touches[1]);
    sz = currentZoom;
    mx = (e.touches[0].clientX + e.touches[1].clientX)/2 - r.left;
    my = (e.touches[0].clientY + e.touches[1].clientY)/2 - r.top;
  }, {passive:false});

  scroll.addEventListener('touchmove', e => {
    if (e.touches.length!==2 || !sd) return;
    e.preventDefault();
    pz = sz * pd(e.touches[0], e.touches[1]) / sd;
    if (!raf) raf = requestAnimationFrame(flush);
  }, {passive:false});

  const end = () => { sd=null; cancelAnimationFrame(raf); raf=null; };
  scroll.addEventListener('touchend', end);
  scroll.addEventListener('touchcancel', end);
})();

// ═══════════════════════════════════════
// COLUMN HEIGHT (fills available page space)
// ═══════════════════════════════════════
function recalcColH(area) {
  const page  = area.closest('.page');
  const ps    = getComputedStyle(page);
  const inner = page.clientHeight - parseFloat(ps.paddingTop) - parseFloat(ps.paddingBottom);
  let used = 0;
  for (const c of page.children) {
    if (c === area) break;
    used += c.offsetHeight
          + parseFloat(getComputedStyle(c).marginTop    || 0)
          + parseFloat(getComputedStyle(c).marginBottom || 0);
  }
  area.style.height = Math.max(40, Math.floor(inner - used)) + 'px';
}

// ═══════════════════════════════════════
// PAGINATION  — spill overflow to next page
// ═══════════════════════════════════════
// CSS columns overflow HORIZONTALLY (4th column to the right).
// scrollWidth > clientWidth detects this even with overflow:hidden.
function isOverflow(area) {
  return area.scrollWidth > area.clientWidth + 2;
}

let _rfTimer = null;
function scheduleReflow() { clearTimeout(_rfTimer); _rfTimer = setTimeout(reflowPages, 380); }

function reflowPages() {
  const wrapper = document.getElementById('zoomWrapper');
  let pages = () => [...wrapper.querySelectorAll('.page')];

  // FORWARD — push overflow to next page
  let all = pages();
  for (let i = 0; i < all.length; i++) {
    const area = all[i].querySelector('.columns-area');
    if (!area) continue;
    let g = 0;
    while (isOverflow(area) && g++ < 800) {
      if (!all[i+1]) {
        const np = makeContPage(all.length + 1);
        wrapper.appendChild(np);
        requestAnimationFrame(() => {
          recalcColH(np.querySelector('.columns-area'));
          cacheNatSize();
          // Re-apply zoom to resize outer container
          const s = document.getElementById('editorScroll');
          applyZoom(currentZoom, s.clientWidth / 2, s.clientHeight / 2);
        });
        all = pages();
      }
      const nextArea = all[i+1].querySelector('.columns-area');
      const kids = blockKids(area);
      if (!kids.length) break;
      const last = kids[kids.length-1];
      area.removeChild(last);
      nextArea.insertBefore(last, nextArea.firstChild);
    }
  }

  // BACKWARD — pull back if room exists
  all = pages();
  for (let i = all.length-1; i > 0; i--) {
    const area = all[i].querySelector('.columns-area');
    const prev = all[i-1].querySelector('.columns-area');
    if (!area || !prev) continue;
    let g = 0;
    while (g++ < 800) {
      const fc = blockKids(area)[0];
      if (!fc) break;
      prev.appendChild(fc);
      if (isOverflow(prev)) { prev.removeChild(fc); area.insertBefore(fc, area.firstChild); break; }
    }
  }

  // Trim empty continuation pages
  [...wrapper.querySelectorAll('.page-cont')].reverse().forEach(p => {
    const a = p.querySelector('.columns-area');
    if (!a || !a.innerText.trim()) p.remove();
  });

  updateCounts();
}

function blockKids(area) {
  return [...area.childNodes].filter(n => n.nodeType===1 || (n.nodeType===3 && n.textContent.trim()));
}

function makeContPage(_num) {
  const p = document.createElement('div');
  p.className = 'page page-cont';
  p.innerHTML = `<div class="columns-area" contenteditable="true" spellcheck="true"></div>`;
  bindArea(p.querySelector('.columns-area'));
  return p;
}

function bindArea(area) {
  area.addEventListener('input', () => { updateCounts(); scheduleReflow(); });
  // Mirror urdu mode state onto newly created pages
  if (urduMode) applyUrduToArea(area);
}

// ═══════════════════════════════════════
// COUNTS + PAGE NAVIGATOR
// ═══════════════════════════════════════
let _currentPage = 1;

function updateCounts() {
  let t = '';
  document.querySelectorAll('.columns-area').forEach(a => t += (a.innerText||'') + ' ');
  const w = t.trim() ? t.trim().split(/\s+/).length : 0;
  document.getElementById('wordCount').textContent  = 'Words: ' + w;
  document.getElementById('charCount').textContent  = 'Characters: ' + t.replace(/\s/g,'').length;
  const n = document.querySelectorAll('.page').length;
  document.getElementById('pageCount').textContent  = 'Pages: ' + n;
  rebuildPageNav(n);
}

function rebuildPageNav(n) {
  const row = document.getElementById('pgBtnRow');
  row.innerHTML = '';
  for (let i = 1; i <= n; i++) {
    const btn = document.createElement('button');
    btn.className = 'pg-btn' + (i === _currentPage ? ' active' : '');
    btn.textContent = 'P' + i;
    btn.onclick = () => goToPage(i);
    row.appendChild(btn);
  }
}

function goToPage(num) {
  const pages = document.querySelectorAll('.page');
  if (num < 1 || num > pages.length) return;
  _currentPage = num;
  // Scroll the page into view inside the scaled wrapper
  const scroll  = document.getElementById('editorScroll');
  const wrapper = document.getElementById('zoomWrapper');
  const target  = pages[num - 1];
  const wRect   = wrapper.getBoundingClientRect();
  const tRect   = target.getBoundingClientRect();
  // Position in unscaled wrapper coords
  const topInWrapper = (tRect.top - wRect.top) / currentZoom;
  const leftInWrapper = (tRect.left - wRect.left) / currentZoom;
  // Convert to scroll position
  const ox = parseFloat(wrapper.style.left) || 0;
  scroll.scrollTop  = topInWrapper * currentZoom - 24;  // 24px padding
  scroll.scrollLeft = Math.max(0, leftInWrapper * currentZoom + ox - (scroll.clientWidth - target.offsetWidth * currentZoom) / 2);
  // Update active button
  document.querySelectorAll('.pg-btn').forEach((b, i) => b.classList.toggle('active', i + 1 === num));
}

function navPage(delta) {
  const n = document.querySelectorAll('.page').length;
  goToPage(Math.min(n, Math.max(1, _currentPage + delta)));
}

// Track which page is visible while scrolling
document.getElementById('editorScroll').addEventListener('scroll', () => {
  const scroll  = document.getElementById('editorScroll');
  const wrapper = document.getElementById('zoomWrapper');
  const pages   = [...document.querySelectorAll('.page')];
  const mid     = scroll.scrollTop + scroll.clientHeight / 2;
  let closest = 0, minDist = Infinity;
  pages.forEach((p, i) => {
    const wRect = wrapper.getBoundingClientRect();
    const pRect = p.getBoundingClientRect();
    const pTop  = (pRect.top - wRect.top) / currentZoom * currentZoom;
    const pBot  = pTop + p.offsetHeight * currentZoom;
    const pMid  = (pTop + pBot) / 2 - scroll.scrollTop;
    const dist  = Math.abs(pMid - scroll.clientHeight / 2);
    if (dist < minDist) { minDist = dist; closest = i; }
  });
  if (closest + 1 !== _currentPage) {
    _currentPage = closest + 1;
    document.querySelectorAll('.pg-btn').forEach((b, i) => b.classList.toggle('active', i === closest));
  }
}, { passive: true });

// ═══════════════════════════════════════
// PASTE — convert plain text to <div> blocks
// ═══════════════════════════════════════
document.getElementById('editorScroll').addEventListener('paste', e => {
  if (!e.target.closest('.columns-area')) return;
  e.preventDefault();
  const raw = (e.clipboardData || window.clipboardData).getData('text/plain');
  const html = raw.split(/\r?\n/).map(l => `<div>${escHtml(l)||'<br>'}</div>`).join('');
  document.execCommand('insertHTML', false, html);
  scheduleReflow(); updateCounts();
}, true);

// ═══════════════════════════════════════
// FONT / SIZE
// ═══════════════════════════════════════
function applyFont(f) {
  document.querySelectorAll('.columns-area').forEach(a => {
    if (!a.classList.contains('urdu-mode')) a.style.fontFamily = f;
  });
}
function applyFontSize(s) {
  // Store as px — pixel-accurate sizes (1pt = 96/72 px)
  const px = (parseFloat(s) * 96 / 72).toFixed(2).replace(/\.?0+$/, '') + 'px';
  document.querySelectorAll('.columns-area').forEach(a => {
    if (!a.classList.contains('urdu-mode')) a.style.fontSize = px;
  });
  setTimeout(reflowPages, 300);
}

// ═══════════════════════════════════════
// URDU RTL MODE
// ═══════════════════════════════════════
let urduMode = false;
// Jameel Noori is loaded via CDN <link> in <head> — no manual FontFace needed

const URDU_FONT = "JameelNooriNastaliq, 'Nastaliq', serif";
const URDU_SIZE = '20px';  // ≈ 15pt → px
const URDU_LH   = '2.4';

function applyUrduToArea(a) {
  a.classList.add('urdu-mode');
  a.style.fontFamily = URDU_FONT;
  a.style.fontSize   = URDU_SIZE;
  a.style.lineHeight = URDU_LH;
  a.dir = 'rtl';
}
function removeUrduFromArea(a) {
  a.classList.remove('urdu-mode');
  a.style.fontFamily = '';
  const ptVal = parseFloat(document.getElementById('fontSize').value) || 10;
  a.style.fontSize = (ptVal * 96 / 72).toFixed(2).replace(/\.?0+$/, '') + 'px';
  a.style.lineHeight = '';
  a.dir = 'ltr';
}

function toggleUrdu() {
  urduMode = !urduMode;

  document.querySelectorAll('.columns-area').forEach(a => {
    if (urduMode) applyUrduToArea(a); else removeUrduFromArea(a);
  });

  const btn = document.getElementById('urduBtn');
  btn.classList.toggle('on', urduMode);
  btn.style.color      = urduMode ? '#fff'    : '#1a6b3a';
  btn.style.background = urduMode ? '#1a6b3a' : '';
  btn.style.border     = urduMode ? '1px solid #1a6b3a' : '';
  btn.title = urduMode ? 'Switch to LTR (English) mode' : 'Switch to RTL (Urdu) mode';

  document.querySelectorAll('.page').forEach(p => {
    p.style.direction = urduMode ? 'rtl' : 'ltr';
  });
  document.getElementById('fontFamily').value = urduMode
    ? "JameelNooriNastaliq,serif"
    : "'EB Garamond',serif";
}

// ═══════════════════════════════════════
// LATEX  (MathJax 3) — auto-render all $…$ / $$…$$ in document
// ═══════════════════════════════════════
function escAttr(s) { return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/**
 * Full LaTeX document renderer:
 * 1. Collects raw LaTeX source from ALL pages
 * 2. Strips preamble (\documentclass … \begin{document}) and \end{document}
 * 3. Converts LaTeX structural commands → HTML
 * 4. Puts HTML into page 1, removes continuation pages, reflows
 * 5. Calls MathJax to typeset all remaining $…$ / $$…$$ math
 */
function renderAllLatex() {
  if (typeof MathJax === 'undefined' || !MathJax.typesetPromise) {
    alert('MathJax is still loading — please try again in a moment.');
    return;
  }

  // ── 1. Collect raw text from every page ──────────────────────────────
  const allAreas = [...document.querySelectorAll('.columns-area')];
  let src = allAreas.map(a => a.innerText).join('\n');

  const hasMath  = src.includes('$');
  const hasLatex = /\\(begin|end|item|section|textbf|usepackage|documentclass)/i.test(src);

  if (!hasMath && !hasLatex) {
    alert('No LaTeX found.\nPaste LaTeX source or write $…$ math equations, then click Render LaTeX.');
    return;
  }

  // ── 2. Strip LaTeX preamble & document wrapper ───────────────────────
  // Remove everything up to (and including) \begin{document}
  src = src.replace(/^[\s\S]*?\\begin\{document\}/m, '');
  // Remove \end{document} and anything after
  src = src.replace(/\\end\{document\}[\s\S]*$/m, '');

  // ── 3. Convert LaTeX → HTML ───────────────────────────────────────────
  function latexToHtml(tex) {
    // Remove % comments (but keep the newline)
    tex = tex.replace(/%[^\n]*/g, '');

    // ── Spacing / breaks ──────────────────────────────────────────────
    tex = tex.replace(/\\\\(\s*\[[\d.]+[a-z]*\])?/g, '<br>');  // \\ and \\[1em]
    tex = tex.replace(/\\newline\b/g, '<br>');
    tex = tex.replace(/\\hline\b/g, '<hr style="border-top:1px solid #888;margin:3px 0;">');
    tex = tex.replace(/\\vspace\*?\{[^}]*\}/g, '');
    tex = tex.replace(/\\hspace\*?\{[^}]*\}/g, '&nbsp;');
    tex = tex.replace(/\\noindent\b/g, '');
    tex = tex.replace(/\\medskip\b/g, '<div style="height:6px"></div>');
    tex = tex.replace(/\\bigskip\b/g, '<div style="height:10px"></div>');
    tex = tex.replace(/\\smallskip\b/g, '<div style="height:3px"></div>');
    tex = tex.replace(/\\quad\b/g, '&nbsp;&nbsp;&nbsp;&nbsp;');
    tex = tex.replace(/\\qquad\b/g, '&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;');
    tex = tex.replace(/~~/g, '&nbsp;&nbsp;');
    tex = tex.replace(/~/g, '&nbsp;');

    // ── Font / style commands ─────────────────────────────────────────
    // Recursive braces handler for simple commands
    function cmd1(tag) {
      return (_, inner) => `<${tag}>${inner}</${tag}>`;
    }
    // Repeatedly apply so nested braces resolve
    for (let i = 0; i < 4; i++) {
      tex = tex.replace(/\\textbf\{([^{}]*)\}/g, cmd1('b'));
      tex = tex.replace(/\\textit\{([^{}]*)\}/g,  cmd1('i'));
      tex = tex.replace(/\\emph\{([^{}]*)\}/g,    cmd1('i'));
      tex = tex.replace(/\\underline\{([^{}]*)\}/g, cmd1('u'));
      tex = tex.replace(/\\texttt\{([^{}]*)\}/g,  (_, s) => `<code>${s}</code>`);
      tex = tex.replace(/\\text\{([^{}]*)\}/g,    (_, s) => s);
      tex = tex.replace(/\\mbox\{([^{}]*)\}/g,    (_, s) => s);
    }

    // Size declarations (scoped loosely — just wrap remaining line context)
    tex = tex.replace(/\{\\Large\s+([^}]+)\}/g,  (_, s) => `<span style="font-size:1.3em">${s}</span>`);
    tex = tex.replace(/\{\\large\s+([^}]+)\}/g,  (_, s) => `<span style="font-size:1.15em">${s}</span>`);
    tex = tex.replace(/\{\\small\s+([^}]+)\}/g,  (_, s) => `<span style="font-size:.88em">${s}</span>`);
    tex = tex.replace(/\{\\footnotesize\s+([^}]+)\}/g, (_, s) => `<span style="font-size:.8em">${s}</span>`);
    tex = tex.replace(/\\Large\b/g, '').replace(/\\large\b/g, '').replace(/\\small\b/g, '');

    // ── Sections ──────────────────────────────────────────────────────
    tex = tex.replace(/\\section\*?\{([^}]*)\}/g,
      (_, t) => `\n<div style="font-weight:700;font-size:1.05em;margin:6px 0 2px;border-bottom:1px solid #aaa;padding-bottom:1px;">${t}</div>\n`);
    tex = tex.replace(/\\subsection\*?\{([^}]*)\}/g,
      (_, t) => `\n<div style="font-weight:700;margin:4px 0 1px;">${t}</div>\n`);
    tex = tex.replace(/\\subsubsection\*?\{([^}]*)\}/g,
      (_, t) => `\n<div style="font-weight:600;font-style:italic;margin:3px 0 1px;">${t}</div>\n`);

    // ── Environments ──────────────────────────────────────────────────
    // center
    tex = tex.replace(/\\begin\{center\}([\s\S]*?)\\end\{center\}/g,
      (_, body) => `<div style="text-align:center;">${processBody(body)}</div>`);

    // enumerate (numbered list)
    tex = tex.replace(/\\begin\{enumerate\}([\s\S]*?)\\end\{enumerate\}/g,
      (_, body) => `<ol style="margin:2px 0 2px 18px;padding:0;">${itemsToLi(body)}</ol>`);

    // itemize (bullet list)
    tex = tex.replace(/\\begin\{itemize\}([\s\S]*?)\\end\{itemize\}/g,
      (_, body) => `<ul style="margin:2px 0 2px 18px;padding:0;">${itemsToLi(body)}</ul>`);

    // description
    tex = tex.replace(/\\begin\{description\}([\s\S]*?)\\end\{description\}/g,
      (_, body) => `<dl style="margin:2px 0 2px 8px;">${descItems(body)}</dl>`);

    // verbatim / lstlisting
    tex = tex.replace(/\\begin\{verbatim\}([\s\S]*?)\\end\{verbatim\}/g,
      (_, body) => `<pre style="font-family:monospace;font-size:.85em;background:#f5f5f5;padding:4px 6px;border-radius:3px;">${escHtml(body.trim())}</pre>`);
    tex = tex.replace(/\\begin\{lstlisting\}([\s\S]*?)\\end\{lstlisting\}/g,
      (_, body) => `<pre style="font-family:monospace;font-size:.85em;background:#f5f5f5;padding:4px 6px;border-radius:3px;">${escHtml(body.trim())}</pre>`);

    // quote / quotation
    tex = tex.replace(/\\begin\{quotation?\}([\s\S]*?)\\end\{quotation?\}/g,
      (_, body) => `<blockquote style="margin:4px 0 4px 16px;border-left:2px solid #ccc;padding-left:8px;color:#444;">${processBody(body)}</blockquote>`);

    // Generic remaining environments — strip begin/end tags
    tex = tex.replace(/\\begin\{[^}]*\}/g, '').replace(/\\end\{[^}]*\}/g, '');

    // ── Miscellaneous commands ────────────────────────────────────────
    tex = tex.replace(/\\item\[([^\]]*)\]/g, (_, label) => `<b>${label}</b> `); // \item[label]
    tex = tex.replace(/\\item\b/g, '');  // bare \item (already handled by itemsToLi)
    tex = tex.replace(/\\maketitle\b/g, '');
    tex = tex.replace(/\\tableofcontents\b/g, '');
    tex = tex.replace(/\\newpage\b/g, '');
    tex = tex.replace(/\\clearpage\b/g, '');
    tex = tex.replace(/\\pagebreak\b/g, '');
    tex = tex.replace(/\\centering\b/g, '');
    tex = tex.replace(/\\raggedright\b/g, '');
    tex = tex.replace(/\\raggedleft\b/g, '');
    tex = tex.replace(/\\par\b/g, '\n');
    tex = tex.replace(/\\footnote\{[^}]*\}/g, '');

    // Remove remaining unknown \commands (but NOT math commands inside $…$)
    // We protect math first, strip commands outside math, restore math
    tex = protectedReplace(tex, /\\[a-zA-Z]+\*?\s*/g, '');

    // Remove stray bare braces
    tex = tex.replace(/(?<!\$[^$]*)\{([^{}]*)\}(?![^$]*\$)/g, '$1');

    return tex;
  }

  // Helper: protect $…$ / $$…$$ zones while doing replacements outside them
  function protectedReplace(src, pattern, repl) {
    const zones = [];
    const placeholder = '\x00MATHZONE\x00';
    // Extract math zones
    const protected_ = src.replace(/\$\$[\s\S]*?\$\$|\$[^\n$]*\$/g, m => {
      zones.push(m);
      return placeholder + (zones.length - 1) + '\x00';
    });
    // Apply replacement outside math
    const replaced = protected_.replace(pattern, repl);
    // Restore math zones
    return replaced.replace(/\x00MATHZONE\x00(\d+)\x00/g, (_, i) => zones[+i]);
  }

  // Helper: convert \item lines inside enumerate/itemize to <li>
  function itemsToLi(body) {
    // Split on \item
    const parts = body.split(/\\item(?:\[[^\]]*\])?/);
    return parts.slice(1).map(p => {
      const content = processBody(p.trim());
      return `<li style="margin-bottom:1px;">${content}</li>`;
    }).join('');
  }

  // Helper: description items
  function descItems(body) {
    const parts = body.split(/\\item/);
    return parts.slice(1).map(p => {
      const m = p.match(/^\[([^\]]*)\]([\s\S]*)/);
      if (m) return `<dt style="font-weight:700;">${m[1]}</dt><dd style="margin-left:12px;">${processBody(m[2].trim())}</dd>`;
      return `<dd style="margin-left:12px;">${processBody(p.trim())}</dd>`;
    }).join('');
  }

  // Helper: process a body of text (inline conversion)
  function processBody(t) {
    return t.trim().split(/\n{2,}/).map(para => {
      const line = para.replace(/\n/g, ' ').trim();
      return line ? `<div>${line}</div>` : '';
    }).join('');
  }

  // ── 4. Run the converter ─────────────────────────────────────────────
  let html = latexToHtml(src);

  // Convert remaining blank lines / paragraphs to <div> blocks
  const lines = html.split('\n');
  const divLines = lines.map(line => {
    const t = line.trim();
    if (!t) return '';
    // Already an HTML tag?
    if (t.startsWith('<')) return t;
    return `<div>${t}</div>`;
  }).filter(l => l !== '').join('');

  // ── 5. Put HTML into page 1, remove continuation pages, reflow ───────
  document.querySelectorAll('.page-cont').forEach(p => p.remove());
  const primary = document.getElementById('columnsArea');
  primary.innerHTML = divLines;

  // ── Store pre-render source so save/restore preserves LaTeX ──────────
  // We save the HTML BEFORE MathJax converts $…$ to SVG.
  // collectState will use this instead of innerHTML.
  primary.dataset.latexSource = divLines;

  updateCounts();
  setTimeout(() => {
    reflowPages();
    // ── 6. Typeset math with MathJax ─────────────────────────────────
    const areas = [...document.querySelectorAll('.columns-area')];
    MathJax.typesetPromise(areas)
      .then(() => { updateCounts(); setTimeout(reflowPages, 300); })
      .catch(err => console.warn('MathJax error:', err));
  }, 250);
}

// Auto-render on paste
function renderLatexInArea(area) { renderAllLatex(); }

// ═══════════════════════════════════════
// RULER
// ═══════════════════════════════════════
function drawRuler() {
  const canvas = document.getElementById('rulerCanvas');
  const scroll = document.getElementById('editorScroll');
  const dpr = window.devicePixelRatio || 1;
  const W = scroll.offsetWidth, H = 20;
  canvas.width = W*dpr; canvas.height = H*dpr;
  canvas.style.width = W+'px'; canvas.style.height = H+'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  ctx.fillStyle = '#f8f8f8'; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle = '#bbb'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0,H); ctx.lineTo(W,H); ctx.stroke();
  ctx.fillStyle = '#999'; ctx.font = '8px Nunito Sans,sans-serif'; ctx.textAlign = 'center';
  const pageWpx = 793.7 * currentZoom; // 210mm at 96dpi * zoom
  const ox = (W - pageWpx) / 2 + 53 * currentZoom;
  for (let cm = 0; cm <= 18; cm++) {
    const x = ox + cm * 37.8 * currentZoom;
    const t = cm%2===0 ? 8 : 4;
    ctx.beginPath(); ctx.moveTo(x,H-t); ctx.lineTo(x,H); ctx.stroke();
    if (cm%2===0 && cm>0) ctx.fillText(cm, x, H-9);
  }
}

// ═══════════════════════════════════════
// SMART FORMAT  (* → bold / serial / both)
// ═══════════════════════════════════════
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function transformAsterisks(mode) {
  const sel = window.getSelection();
  let hasSel = false, range = null, selArea = null;

  // Check if there is a real selection inside any columns-area
  if (sel && sel.rangeCount > 0 && !sel.isCollapsed) {
    const r = sel.getRangeAt(0);
    document.querySelectorAll('.columns-area').forEach(a => {
      if (!selArea && a.contains(r.commonAncestorContainer)) { hasSel = true; range = r.cloneRange(); selArea = a; }
    });
  }

  function buildHtml(text) {
    let n = 1;
    return text.split('\n').map(line => {
      const t = line.trim();
      if (t.startsWith('*')) {
        const q = t.slice(1).trim();
        if (mode==='bold')   return `<div><b>${escHtml(q)}</b></div>`;
        if (mode==='serial') return `<div>${n++}. ${escHtml(q)}</div>`;
        if (mode==='both')   return `<div><b>${n++}. ${escHtml(q)}</b></div>`;
        return `<div>${escHtml(q)}</div>`;
      }
      return `<div>${escHtml(line)||'<br>'}</div>`;
    }).join('');
  }

  if (hasSel) {
    // Selection mode: transform only selected text in its area
    const text = sel.toString();
    if (!text.trim()) { alert('No content found.'); return; }
    if (mode !== 'reset' && !text.split('\n').some(l => l.trim().startsWith('*'))) { alert('No lines starting with * found.'); return; }
    selArea.focus(); sel.removeAllRanges(); sel.addRange(range);
    document.execCommand('insertHTML', false, buildHtml(text));
  } else {
    // No-selection mode: gather ALL pages, merge, process, put in page 1, reflow distributes
    const allAreas = [...document.querySelectorAll('.columns-area')];
    const text = allAreas.map(a => a.innerText).join('\n').replace(/\n{3,}/g, '\n\n');
    if (!text.trim()) { alert('No content found.'); return; }
    if (mode !== 'reset' && !text.split('\n').some(l => l.trim().startsWith('*'))) { alert('No lines starting with * found.'); return; }
    // Remove continuation pages, dump all HTML into page 1, let reflowPages redistribute
    document.querySelectorAll('.page-cont').forEach(p => p.remove());
    document.getElementById('columnsArea').innerHTML = buildHtml(text);
  }

  updateCounts();
  setTimeout(reflowPages, 200);
}

// ═══════════════════════════════════════
// SMART FORMAT  (numbers → bold)
// Detects lines in format:  1. Question text
// Bolds the entire line keeping the number prefix
// ═══════════════════════════════════════
function transformNumbers(mode) {
  const sel = window.getSelection();
  let hasSel = false, range = null, selArea = null;

  if (sel && sel.rangeCount > 0 && !sel.isCollapsed) {
    const r = sel.getRangeAt(0);
    document.querySelectorAll('.columns-area').forEach(a => {
      if (!selArea && a.contains(r.commonAncestorContainer)) { hasSel = true; range = r.cloneRange(); selArea = a; }
    });
  }

  const numRegex = /^(\d+[\.\)]\s*)(.*)$/;

  function buildHtml(text) {
    return text.split('\n').map(line => {
      const t = line.trim();
      const m = t.match(numRegex);
      if (m) {
        // m[1] = "1. ", m[2] = "Question text"
        const prefix = escHtml(m[1]);
        const rest   = escHtml(m[2]);
        return `<div><b>${prefix}${rest}</b></div>`;
      }
      return `<div>${escHtml(line)||'<br>'}</div>`;
    }).join('');
  }

  if (hasSel) {
    const text = sel.toString();
    if (!text.trim()) { alert('No content found.'); return; }
    if (!text.split('\n').some(l => numRegex.test(l.trim()))) { alert('No numbered lines (e.g. 1. Question) found in selection.'); return; }
    selArea.focus(); sel.removeAllRanges(); sel.addRange(range);
    document.execCommand('insertHTML', false, buildHtml(text));
  } else {
    const allAreas = [...document.querySelectorAll('.columns-area')];
    const text = allAreas.map(a => a.innerText).join('\n').replace(/\n{3,}/g, '\n\n');
    if (!text.trim()) { alert('No content found.'); return; }
    if (!text.split('\n').some(l => numRegex.test(l.trim()))) { alert('No numbered lines (e.g. 1. Question) found.'); return; }
    document.querySelectorAll('.page-cont').forEach(p => p.remove());
    document.getElementById('columnsArea').innerHTML = buildHtml(text);
  }

  updateCounts();
  setTimeout(reflowPages, 200);
}

// ═══════════════════════════════════════
// REMOVE EMPTY LINES
// Strips blank/whitespace-only lines from all pages
// ═══════════════════════════════════════
function removeEmptyLines() {
  const allAreas = [...document.querySelectorAll('.columns-area')];
  // Collect all text from every page
  const text = allAreas.map(a => a.innerText).join('\n');
  if (!text.trim()) { alert('No content found.'); return; }

  // Filter out lines that are empty or whitespace-only
  const cleaned = text.split('\n')
    .filter(line => line.trim() !== '')
    .join('\n');

  // Build HTML divs
  const html = cleaned.split('\n')
    .map(line => `<div>${escHtml(line)}</div>`)
    .join('');

  // Dump into page 1 and reflow
  document.querySelectorAll('.page-cont').forEach(p => p.remove());
  document.getElementById('columnsArea').innerHTML = html;

  updateCounts();
  setTimeout(reflowPages, 200);
}


// Rasterises each page using html2canvas + jsPDF.
// MathJax SVGs are pre-converted to PNG data URIs so they render correctly.
// On mobile uses Web Share API to share the PDF file directly.
// On desktop triggers a direct download.
// ═══════════════════════════════════════

// ── Rasterise one MathJax SVG element to a PNG data URL ─────────────────
function _mjxSvgToPng(container, globalDefsHTML) {
  return new Promise(resolve => {
    const svg = container.querySelector('svg');
    if (!svg) { resolve(null); return; }
    const cw = Math.max(container.offsetWidth  || 0, 4);
    const ch = Math.max(container.offsetHeight || 0, 4);
    const clone = svg.cloneNode(true);
    clone.setAttribute('xmlns',       'http://www.w3.org/2000/svg');
    clone.setAttribute('xmlns:xlink', 'http://www.w3.org/1999/xlink');
    clone.setAttribute('width',  cw * 2 + 'px');
    clone.setAttribute('height', ch * 2 + 'px');
    if (globalDefsHTML) {
      let d = clone.querySelector('defs');
      if (!d) { d = document.createElementNS('http://www.w3.org/2000/svg','defs'); clone.insertBefore(d,clone.firstChild); }
      d.innerHTML = globalDefsHTML + d.innerHTML;
    }
    const dataURL = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(new XMLSerializer().serializeToString(clone));
    const img = new Image();
    img.onload = () => {
      const cv = document.createElement('canvas');
      cv.width = cw * 2; cv.height = ch * 2;
      cv.getContext('2d').drawImage(img, 0, 0, cw * 2, ch * 2);
      resolve({ png: cv.toDataURL('image/png'), cw, ch });
    };
    img.onerror = () => resolve(null);
    img.src = dataURL;
  });
}

async function _rasteriseMath() {
  const globalDefs = document.querySelector('svg[style*="display"]');
  const defsHTML   = globalDefs ? (globalDefs.querySelector('defs')?.innerHTML || globalDefs.innerHTML) : '';
  const map = new Map();
  for (const ctr of document.querySelectorAll('mjx-container')) {
    const result = await _mjxSvgToPng(ctr, defsHTML);
    if (result) map.set(ctr, result);
  }
  return map;
}

function _serialiseArea(area, mathMap) {
  const clone    = area.cloneNode(true);
  const liveCtr  = [...area.querySelectorAll('mjx-container')];
  const cloneCtr = [...clone.querySelectorAll('mjx-container')];
  liveCtr.forEach((liveEl, idx) => {
    const data = mathMap.get(liveEl);
    const cloneEl = cloneCtr[idx];
    if (!data || !cloneEl) return;
    const img = document.createElement('img');
    img.src = data.png; img.width = data.cw; img.height = data.ch;
    img.style.cssText = 'vertical-align:middle;display:inline-block;max-width:none;';
    cloneEl.replaceWith(img);
  });
  return clone.innerHTML;
}

async function _fetchFontB64(url, family, format) {
  try {
    const buf   = await (await fetch(url)).arrayBuffer();
    const bytes = new Uint8Array(buf);
    let bin = '';
    for (let i = 0; i < bytes.length; i += 8192) bin += String.fromCharCode(...bytes.subarray(i, i + 8192));
    return `@font-face{font-family:${family};src:url(data:font/${format};base64,${btoa(bin)}) format('${format}');}`;
  } catch(e) { console.warn('Font fetch failed:', url, e); return ''; }
}

function _triggerDownload(blob, fileName) {
  const url = URL.createObjectURL(blob);
  const a = Object.assign(document.createElement('a'), { href:url, download:fileName });
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 5000);
}

async function savePDF() {
  if (typeof html2canvas === 'undefined' || typeof jspdf === 'undefined') {
    alert('PDF library still loading — please try again in a moment.'); return;
  }
  const pages = [...document.querySelectorAll('.page')];
  if (!pages.length) { alert('Nothing to export.'); return; }

  const btn      = document.querySelector('button[onclick="savePDF()"]');
  const origHTML = btn ? btn.innerHTML : '';
  if (btn) { btn.disabled = true; btn.innerHTML = origHTML.replace(/Save PDF|Generating…|Compiling…/, 'Generating…'); }

  try {
    const mathMap = await _rasteriseMath();

    const headline = document.querySelector('.headline')?.innerHTML || 'Shadab Coaching Centre';
    const inputs   = [...document.querySelectorAll('.info-input')];
    const [cls, subj, fm, time] = inputs.map(i => escHtml(i.value || ''));
    const pad    = pages[0].style.padding || '0.1in';
    const areaEl = pages[0].querySelector('.columns-area');
    const aFont  = areaEl?.style.fontFamily || "'EB Garamond',Georgia,serif";
    const aSize  = areaEl?.style.fontSize   || '14px';
    const aLH    = areaEl?.style.lineHeight || '1.65';
    const aDir   = areaEl?.dir || 'ltr';
    const isUrdu = areaEl?.classList.contains('urdu-mode') || false;

    let embeddedFontCSS = '';
    if (isUrdu) {
      embeddedFontCSS = await _fetchFontB64(
        '../fonts/Jameel Noori Nastaleeq.ttf',
        'JameelNooriNastaliq', 'truetype'
      );
    }

    function buildPageHTML(pg, idx) {
      const area  = pg.querySelector('.columns-area');
      const areaH = area ? area.offsetHeight + 'px' : '240mm';
      const aHTML = area ? _serialiseArea(area, mathMap) : '';
      if (idx === 0) {
        const divs = [...pg.querySelectorAll('.page-divider')].map(h=>`<hr class="${h.className}">`).join('');
        return `<div class="page">
          <div class="page-header"><div class="headline">${headline}</div></div>
          <div class="info-row">
            <div class="info-left">
              <div class="info-field"><label>Class:</label><span class="info-val">${cls}</span></div>
              <div class="info-field"><label>Subject:</label><span class="info-val">${subj}</span></div>
            </div>
            <div class="info-right">
              <div class="info-field"><label>FM:</label><span class="info-val">${fm}</span></div>
              <div class="info-field"><label>Time:</label><span class="info-val">${time}</span></div>
            </div>
          </div>
          ${divs || '<hr class="page-divider"><hr class="page-divider thin">'}
          <div class="columns-area" style="height:${areaH}">${aHTML}</div>
        </div>`;
      }
      return `<div class="page"><div class="cont-label">— continued —</div><div class="columns-area" style="height:${areaH}">${aHTML}</div></div>`;
    }

    const allPagesHTML = pages.map((pg,i) => buildPageHTML(pg,i)).join('\n');
    const title = document.querySelector('.headline')?.innerText?.trim() || 'Shadab';

    const externalLinks = [...document.head.querySelectorAll('link[rel="stylesheet"]')]
      .filter(l => !l.href.includes('jameel-noori'))
      .map(l => `<link rel="stylesheet" href="${l.href}">`)
      .join('\n');

    const renderCSS = `
      ${embeddedFontCSS}
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
      html,body{background:#fff;width:794px;}
      .page{width:794px;height:1123px;padding:${pad};background:#fff;overflow:hidden;position:relative;display:block;}
      .page-header{text-align:center;margin-bottom:4px;}
      .headline{font-family:'EB Garamond',serif;font-size:20px;font-weight:700;letter-spacing:.5px;color:#111;line-height:1.15;margin-bottom:3px;}
      .info-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:6px;font-family:'Nunito Sans',sans-serif;font-size:12px;}
      .info-left,.info-right{display:flex;flex-direction:column;gap:4px;}
      .info-field{display:flex;align-items:center;gap:6px;}
      .info-field label{font-weight:700;color:#222;min-width:48px;font-size:11px;}
      .info-val{font-family:'EB Garamond',serif;font-size:13px;color:#111;border-bottom:1.5px solid #555;min-width:80px;padding:1px 2px;display:inline-block;}
      .page-divider{border:none;border-top:2px solid #222;margin:6px 0 8px;}
      .page-divider.thin{border-top-width:1px;border-top-color:#999;margin:3px 0 8px;}
      .cont-label{font-size:13px;font-family:'EB Garamond',serif;color:#888;text-align:center;margin-bottom:6px;font-style:italic;}
      .columns-area{column-count:3;column-gap:14px;column-rule:1px solid #ccc;column-fill:auto;overflow:hidden;
        font-family:${aFont};font-size:${aSize};line-height:${aLH};color:#111;word-break:break-word;
        text-align:${isUrdu?'right':'justify'};direction:${aDir};}
      .columns-area div,.columns-area p{margin:0;min-height:1lh;}
      b,strong{font-weight:700;}i,em{font-style:italic;}u{text-decoration:underline;}
      hr{border:none;border-top:1px solid #aaa;margin:4px 0;}
      ol{margin:2px 0 2px 18px;padding:0;}ul{margin:2px 0 2px 18px;padding:0;}
    `;

    const renderHTML = `<!DOCTYPE html><html><head><meta charset="UTF-8">${externalLinks}<style>${renderCSS}</style></head><body>${allPagesHTML}</body></html>`;

    const iframe = document.createElement('iframe');
    iframe.style.cssText = 'position:fixed;left:-900px;top:0;width:794px;height:1123px;border:none;visibility:hidden;';
    document.body.appendChild(iframe);

    const { jsPDF } = jspdf;
    const pdf = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4', compress:true });

    try {
      await new Promise(resolve => { iframe.onload = resolve; iframe.srcdoc = renderHTML; });
      await iframe.contentDocument.fonts.ready;
      await new Promise(r => setTimeout(r, 400));

      const iframePages = [...iframe.contentDocument.querySelectorAll('.page')];
      for (let i = 0; i < iframePages.length; i++) {
        const pg = iframePages[i];
        iframe.contentWindow.scrollTo(0, pg.offsetTop);
        await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
        const canvas = await html2canvas(pg, {
          scale: 2, useCORS: true, allowTaint: true,
          backgroundColor: '#ffffff', logging: false,
          width: 794, height: 1123, x: 0, y: 0,
          scrollX: 0, scrollY: -pg.offsetTop,
          windowWidth: 794, windowHeight: 1123,
        });
        if (i > 0) pdf.addPage('a4','portrait');
        pdf.addImage(canvas.toDataURL('image/jpeg', 0.97), 'JPEG', 0, 0, 210, 297);
      }
    } finally {
      document.body.removeChild(iframe);
    }

    const pdfBlob = pdf.output('blob');
    const fileName = title.replace(/[^\w\u0600-\u06FF\s._-]/g,'').replace(/\s+/g,'_') + '.pdf';
    const pdfFile  = new File([pdfBlob], fileName, { type:'application/pdf' });

    if (navigator.canShare?.({ files:[pdfFile] })) {
      try { await navigator.share({ files:[pdfFile], title }); }
      catch(e) { if (e.name !== 'AbortError') _triggerDownload(pdfBlob, fileName); }
    } else {
      _triggerDownload(pdfBlob, fileName);
    }

  } catch(err) {
    if (err.name !== 'AbortError') { console.error('PDF error:', err); alert('PDF generation failed:\n\n' + err.message); }
  } finally {
    if (btn) { btn.disabled = false; btn.innerHTML = origHTML; }
  }
}

// SAVE AS DOCX
// ═══════════════════════════════════════
async function saveDocx() {
  if (typeof docx === 'undefined') { alert('DOCX library loading, try again in a moment.'); return; }
  const { Document, Packer, Paragraph, TextRun, HeadingLevel, AlignmentType, PageBreak } = docx;
  const headline = document.querySelector('.headline')?.innerText?.trim() || 'Shadab Coaching Centre';
  const fi = document.querySelectorAll('.info-input');
  const [cls,subj,fm,time] = [...fi].map(i => i.value);
  const kids = [];

  kids.push(new Paragraph({ text:headline, heading:HeadingLevel.HEADING_1, alignment:AlignmentType.CENTER, spacing:{after:100} }));
  if (cls||subj||fm||time) {
    kids.push(new Paragraph({ children:[
      new TextRun({ text: [cls&&`Class: ${cls}`, subj&&`Subject: ${subj}`, fm&&`FM: ${fm}`, time&&`Time: ${time}`].filter(Boolean).join('   ') })
    ], spacing:{after:120} }));
  }
  kids.push(new Paragraph({ text:'─'.repeat(55), spacing:{after:120} }));

  document.querySelectorAll('.columns-area').forEach((area, pi) => {
    if (pi > 0) kids.push(new Paragraph({ children:[new PageBreak()] }));
    [...area.childNodes].forEach(node => {
      if (node.nodeType === 3) {
        const t = node.textContent.trim();
        if (t) kids.push(new Paragraph({ text:t, spacing:{after:60} }));
        return;
      }
      if (node.nodeType !== 1) return;
      // Check if it's a rendered LaTeX node
      if (node.dataset?.latex) {
        kids.push(new Paragraph({ text:`[LaTeX: ${node.dataset.latex}]`, spacing:{after:60} })); return;
      }
      const runs = [];
      (function walk(el) {
        el.childNodes.forEach(c => {
          if (c.nodeType===3) {
            const t = c.textContent;
            if (t) runs.push(new TextRun({ text:t, bold:!!c.parentElement?.closest('b,strong') }));
          } else if (c.nodeType===1) {
            if (c.tagName==='BR') runs.push(new TextRun({text:'\n'}));
            else walk(c);
          }
        });
      })(node);
      if (runs.length) kids.push(new Paragraph({ children:runs, spacing:{after:60} }));
    });
  });

  const blob = await Packer.toBlob(new Document({
    sections:[{ properties:{ page:{ margin:{top:680,right:793,bottom:680,left:793} } }, children:kids }]
  }));
  const url = URL.createObjectURL(blob);
  const a = Object.assign(document.createElement('a'), { href:url, download:`${headline}.docx` });
  a.click(); URL.revokeObjectURL(url);
}

  drawRuler();
  const area = document.getElementById('columnsArea');
  document.querySelectorAll('.info-input').forEach(i => i.addEventListener('focus', () => i.style.outline='none'));

  requestAnimationFrame(() => {
    recalcColH(area);
    bindArea(area);

    const s = document.getElementById('editorScroll');

    // Auto-fit: calculate zoom so the A4 page (210mm = ~794px) fits the viewport width
    const pageNatW  = document.getElementById('page1').offsetWidth; // natural px width of one page
    const wrapPad   = 80; // 40px each side padding
    const fitZoom   = Math.min(1.0, (s.clientWidth - wrapPad) / (pageNatW + wrapPad));
    const initZoom  = Math.max(0.3, parseFloat(fitZoom.toFixed(2)));

    applyZoom(initZoom, s.clientWidth / 2, s.clientHeight / 2);
    rebuildPageNav(1);
  });

  // Close margin panel on outside click
  document.addEventListener('click', e => {
    const panel = document.getElementById('marginPanel');

    if (!panel.contains(e.target) && !btn.contains(e.target)) {
      panel.classList.remove('open');
    }

  // KaTeX auto-render trigger
  document.addEventListener('DOMContentLoaded', () => {
    if (typeof renderMathInElement !== 'undefined') {
      document.querySelectorAll('.columns-area').forEach(a => {
        renderMathInElement(a, { delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}], throwOnError:false });

});

function toggleMarginPanel() {
  const panel = document.getElementById('marginPanel');
  const btn   = document.getElementById('marginBtn');
  const isOpen = panel.classList.contains('open');
  if (isOpen) { panel.classList.remove('open'); return; }

  // Position panel so it never goes off-screen
  const br = btn.getBoundingClientRect();
  const PW = 220; // panel width
  const vw = window.innerWidth;

  let left = br.left;
  // Push left if it would overflow the right edge
  if (left + PW > vw - 8) left = vw - PW - 8;
  // Never go off the left edge
  if (left < 8) left = 8;

  panel.style.top  = (br.bottom + 4) + 'px';
  panel.style.left = left + 'px';
  panel.classList.add('open');
}

// Margin helpers — all values in inches
function inLabel(v) { return parseFloat(v).toFixed(2).replace(/\.?0+$/, '') + '″'; }

function updateMarginLabel(sliderId, labelId) {
  document.getElementById(labelId).textContent = inLabel(document.getElementById(sliderId).value);
}

function setPresetMargin(preset) {
  // A4 standard presets in inches
  const presets = {
    normal: { top:1.0,  bot:1.0,  left:1.25, right:1.25 },
    narrow: { top:0.5,  bot:0.5,  left:0.5,  right:0.5  },
    wide:   { top:1.5,  bot:1.5,  left:2.0,  right:2.0  },
  };
  const m = presets[preset];
  ['Top','Bot','Left','Right'].forEach(k => {
    const key = k === 'Bot' ? 'bot' : k.toLowerCase();
    const id = 'm' + k;
    document.getElementById(id).value = m[key];
    document.getElementById(id + 'V').textContent = inLabel(m[key]);
  });
  applyMargins();
}

function applyMargins() {
  const t = document.getElementById('mTop').value;
  const b = document.getElementById('mBot').value;
  const l = document.getElementById('mLeft').value;
  const r = document.getElementById('mRight').value;
  // Apply as inches — the browser respects in units natively
  const padding = `${t}in ${r}in ${b}in ${l}in`;
  document.querySelectorAll('.page').forEach(p => p.style.padding = padding);
  // Recalc column heights on all pages after margin change
  document.querySelectorAll('.columns-area').forEach(a => recalcColH(a));
  setTimeout(reflowPages, 200);
  document.getElementById('marginPanel').classList.remove('open');
}
